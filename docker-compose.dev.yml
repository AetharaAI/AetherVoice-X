services:
  gateway:
    command: sh -lc "uvicorn app.main:app --host ${GATEWAY_HOST:-0.0.0.0} --port ${GATEWAY_PORT:-8080} --reload"
    volumes:
      - .:/app

  asr:
    command: sh -lc "uvicorn app.main:app --host ${ASR_HOST:-0.0.0.0} --port ${ASR_PORT:-8090} --reload"
    volumes:
      - .:/app

  tts:
    command: sh -lc "uvicorn app.main:app --host ${TTS_HOST:-0.0.0.0} --port ${TTS_PORT:-8091} --reload"
    volumes:
      - .:/app

  frontend:
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port ${FRONTEND_PORT:-3000}"
    volumes:
      - .:/app
