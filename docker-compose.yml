services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    env_file: .env
    environment:
      SERVICE_NAME: gateway
      PYTHONPATH: /app/services/worker-common:/app/services/gateway
      HF_HOME: ${HF_HOME}
      HUGGINGFACE_HUB_CACHE: ${HUGGINGFACE_HUB_CACHE}
      TRANSFORMERS_CACHE: ${TRANSFORMERS_CACHE}
      AETHER_MODEL_ROOT: ${AETHER_MODEL_ROOT}
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${GATEWAY_PORT}:${GATEWAY_PORT}"
    depends_on:
      - asr
      - tts
      - redis
      - postgres
      - minio
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOST_MODEL_ROOT:-/mnt/aetherpro/models}:${AETHER_MODEL_ROOT:-/models}:ro
      - ${HOST_HF_CACHE_ROOT:-/mnt/aetherpro/hf-cache}:${HF_HOME:-/hf-cache}

  asr:
    build:
      context: .
      dockerfile: services/asr/Dockerfile
    runtime: ${ASR_CONTAINER_RUNTIME:-nvidia}
    env_file: .env
    environment:
      SERVICE_NAME: asr
      PYTHONPATH: /app/services/worker-common:/app/services/asr
      HF_TOKEN: ${HF_TOKEN}
      HF_HOME: ${HF_HOME}
      HUGGINGFACE_HUB_CACHE: ${HUGGINGFACE_HUB_CACHE}
      TRANSFORMERS_CACHE: ${TRANSFORMERS_CACHE}
      AETHER_MODEL_ROOT: ${AETHER_MODEL_ROOT}
      FASTER_WHISPER_MODEL_PATH: ${FASTER_WHISPER_MODEL_PATH}
      VOXTRAL_MODEL_PATH: ${VOXTRAL_MODEL_PATH}
      VOXTRAL_HTTP_BASE_URL: ${VOXTRAL_HTTP_BASE_URL:-}
      VOXTRAL_WS_BASE_URL: ${VOXTRAL_WS_BASE_URL:-}
      VOXTRAL_API_KEY: ${VOXTRAL_API_KEY:-}
      QWEN3_ASR_MODEL_PATH: ${QWEN3_ASR_MODEL_PATH}
      ASR_DEVICE: ${ASR_DEVICE:-cpu}
      ASR_COMPUTE_TYPE: ${ASR_COMPUTE_TYPE:-int8}
      ASR_GPU_IDS: ${ASR_GPU_IDS:-1}
      NVIDIA_VISIBLE_DEVICES: ${ASR_GPU_IDS:-1}
      NVIDIA_DRIVER_CAPABILITIES: ${ASR_NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${ASR_PORT}:${ASR_PORT}"
    depends_on:
      - redis
      - postgres
      - minio
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOST_MODEL_ROOT:-/mnt/aetherpro/models}:${AETHER_MODEL_ROOT:-/models}:ro
      - ${HOST_HF_CACHE_ROOT:-/mnt/aetherpro/hf-cache}:${HF_HOME:-/hf-cache}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${ASR_GPU_IDS:-1}"]
              capabilities: [gpu]

  voxtral:
    build:
      context: .
      dockerfile: services/voxtral/Dockerfile
    profiles:
      - voxtral
    runtime: ${VOXTRAL_CONTAINER_RUNTIME:-nvidia}
    env_file: .env
    ipc: host
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HF_HOME: ${HF_HOME}
      HUGGINGFACE_HUB_CACHE: ${HUGGINGFACE_HUB_CACHE}
      TRANSFORMERS_CACHE: ${TRANSFORMERS_CACHE}
      VLLM_WORKER_MULTIPROC_METHOD: ${VOXTRAL_VLLM_WORKER_MULTIPROC_METHOD:-spawn}
      VLLM_LOGGING_LEVEL: ${VOXTRAL_VLLM_LOGGING_LEVEL:-INFO}
      NVIDIA_VISIBLE_DEVICES: ${VOXTRAL_GPU_IDS:-2}
      NVIDIA_DRIVER_CAPABILITIES: ${VOXTRAL_NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      VLLM_DISABLE_COMPILE_CACHE: ${VOXTRAL_DISABLE_COMPILE_CACHE:-1}
    command: >
      ${VOXTRAL_MODEL_PATH}
      --host 0.0.0.0
      --port ${VOXTRAL_UPSTREAM_PORT:-8000}
      --served-model-name ${VOXTRAL_REALTIME_MODEL_NAME:-mistralai/Voxtral-Mini-4B-Realtime-2602}
      --trust-remote-code
      --tokenizer-mode mistral
      --config-format mistral
      --load-format mistral
      --dtype auto
      --generation-config vllm
      --enforce-eager
      --gpu-memory-utilization ${VOXTRAL_GPU_MEMORY_UTILIZATION:-0.85}
      --max-model-len ${VOXTRAL_MAX_MODEL_LEN:-8192}
      --api-key ${VOXTRAL_API_KEY:-EMPTY}
      --uvicorn-log-level ${VOXTRAL_UVICORN_LOG_LEVEL:-info}
      --compilation_config '{"cudagraph_mode":"PIECEWISE"}'
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${VOXTRAL_HOST_PORT:-8012}:${VOXTRAL_UPSTREAM_PORT:-8000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOST_MODEL_ROOT:-/mnt/aetherpro/models}:${AETHER_MODEL_ROOT:-/models}:ro
      - ${HOST_HF_CACHE_ROOT:-/mnt/aetherpro/hf-cache}:${HF_HOME:-/hf-cache}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VOXTRAL_GPU_IDS:-2}"]
              capabilities: [gpu]

  moss:
    build:
      context: .
      dockerfile: services/moss/Dockerfile
    profiles:
      - moss
    runtime: ${MOSS_CONTAINER_RUNTIME:-nvidia}
    env_file: .env
    ipc: host
    environment:
      HF_TOKEN: ${HF_TOKEN}
      HF_HOME: ${HF_HOME}
      HUGGINGFACE_HUB_CACHE: ${HUGGINGFACE_HUB_CACHE}
      TRANSFORMERS_CACHE: ${TRANSFORMERS_CACHE}
      AETHER_MODEL_ROOT: ${AETHER_MODEL_ROOT}
      MOSS_MODEL_ID: ${MOSS_MODEL_ID:-OpenMOSS-Team/MOSS-TTS-Realtime}
      MOSS_MODEL_PATH: ${MOSS_MODEL_PATH}
      MOSS_CODEC_MODEL_ID: ${MOSS_CODEC_MODEL_ID:-OpenMOSS-Team/MOSS-Audio-Tokenizer}
      MOSS_CODEC_MODEL_PATH: ${MOSS_CODEC_MODEL_PATH:-}
      MOSS_PROMPT_AUDIO_PATH: ${MOSS_PROMPT_AUDIO_PATH:-}
      MOSS_REALTIME_DEVICE: ${MOSS_REALTIME_DEVICE:-cuda:0}
      MOSS_REALTIME_ATTN_IMPLEMENTATION: ${MOSS_REALTIME_ATTN_IMPLEMENTATION:-auto}
      MOSS_REALTIME_MAX_LENGTH: ${MOSS_REALTIME_MAX_LENGTH:-3000}
      MOSS_REALTIME_SAMPLE_RATE: ${MOSS_REALTIME_SAMPLE_RATE:-24000}
      MOSS_REALTIME_DECODE_CHUNK_FRAMES: ${MOSS_REALTIME_DECODE_CHUNK_FRAMES:-3}
      MOSS_REALTIME_DECODE_OVERLAP_FRAMES: ${MOSS_REALTIME_DECODE_OVERLAP_FRAMES:-0}
      MOSS_REALTIME_TEMPERATURE: ${MOSS_REALTIME_TEMPERATURE:-0.8}
      MOSS_REALTIME_TOP_P: ${MOSS_REALTIME_TOP_P:-0.6}
      MOSS_REALTIME_TOP_K: ${MOSS_REALTIME_TOP_K:-30}
      MOSS_REALTIME_REPETITION_PENALTY: ${MOSS_REALTIME_REPETITION_PENALTY:-1.1}
      MOSS_REALTIME_REPETITION_WINDOW: ${MOSS_REALTIME_REPETITION_WINDOW:-50}
      MOSS_RUNTIME_PORT: ${MOSS_RUNTIME_PORT:-8021}
      NVIDIA_VISIBLE_DEVICES: ${MOSS_GPU_IDS:-3}
      NVIDIA_DRIVER_CAPABILITIES: ${MOSS_NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${MOSS_HOST_PORT:-8013}:${MOSS_RUNTIME_PORT:-8021}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOST_MODEL_ROOT:-/mnt/aetherpro/models}:${AETHER_MODEL_ROOT:-/models}:ro
      - ${HOST_HF_CACHE_ROOT:-/mnt/aetherpro/hf-cache}:${HF_HOME:-/hf-cache}
      - ./:/workspace:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${MOSS_GPU_IDS:-3}"]
              capabilities: [gpu]

  tts:
    build:
      context: .
      dockerfile: services/tts/Dockerfile
    env_file: .env
    environment:
      SERVICE_NAME: tts
      PYTHONPATH: /app/services/worker-common:/app/services/tts
      HF_TOKEN: ${HF_TOKEN}
      HF_HOME: ${HF_HOME}
      HUGGINGFACE_HUB_CACHE: ${HUGGINGFACE_HUB_CACHE}
      TRANSFORMERS_CACHE: ${TRANSFORMERS_CACHE}
      AETHER_MODEL_ROOT: ${AETHER_MODEL_ROOT}
      MOSS_MODEL_PATH: ${MOSS_MODEL_PATH}
      MOSS_REALTIME_BASE_URL: ${MOSS_REALTIME_BASE_URL:-http://moss:8021}
      MOSS_REALTIME_TIMEOUT_SECONDS: ${MOSS_REALTIME_TIMEOUT_SECONDS:-180}
      CHATTERBOX_BASE_URL: ${CHATTERBOX_BASE_URL}
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${TTS_PORT}:${TTS_PORT}"
    depends_on:
      - redis
      - postgres
      - minio
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${HOST_MODEL_ROOT:-/mnt/aetherpro/models}:${AETHER_MODEL_ROOT:-/models}:ro
      - ${HOST_HF_CACHE_ROOT:-/mnt/aetherpro/hf-cache}:${HF_HOME:-/hf-cache}

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    env_file: .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      VITE_WS_BASE_URL: ${VITE_WS_BASE_URL:-}
      VITE_DEV_PROXY_TARGET: ${VITE_DEV_PROXY_TARGET:-}
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${FRONTEND_PORT}:${FRONTEND_PORT}"
    depends_on:
      - gateway

  redis:
    image: redis:7
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:6379:6379"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: aether_voice
      POSTGRES_USER: voice
      POSTGRES_PASSWORD: voice
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:5432:5432"

  minio:
    image: minio/minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    command: server /data --console-address ":9001"
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:9000:9000"
      - "${HOST_BIND_IP:-127.0.0.1}:9001:9001"
    volumes:
      - minio-data:/data

  prometheus:
    image: prom/prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:9090:9090"
    depends_on:
      - gateway
      - asr
      - tts

  grafana:
    image: grafana/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus

  nginx:
    image: nginx:1.27
    profiles:
      - local-edge
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/sites/aether-voice.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${COMPOSE_NGINX_PORT:-8088}:80"
    depends_on:
      - gateway
      - frontend

volumes:
  postgres-data:
  minio-data:
