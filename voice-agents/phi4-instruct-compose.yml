services:
  phi-4-instruct:
    image: vllm/vllm-openai:v0.17.0
    container_name: phi-4-instruct
    restart: unless-stopped
    ipc: host
    runtime: nvidia
    env_file:
      - .env
    ports:
      - "8101:8000"

    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES}
      HF_HOME: ${HF_HOME}
      HF_HUB_CACHE: ${HF_HUB_CACHE}
      HF_TOKEN: ${HF_TOKEN}
      VLLM_WORKER_MULTIPROC_METHOD: ${VLLM_WORKER_MULTIPROC_METHOD}
      VLLM_LOGGING_LEVEL: ${VLLM_LOGGING_LEVEL}

    networks:
      - aether-ops

    volumes:
      - /mnt/aetherpro/models/voice:/models/voice
      - /mnt/aetherpro/hf:/hf

    command:
      /models/voice/microsoft/Phi-4-multimodal-instruct
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --served-model-name
      - phi-4-instruct
      - --trust-remote-code
      - --dtype
      - auto
      - --generation-config
      - vllm
      - --max-model-len
      - "12800"
      - --max-num-seqs
      - "2"
      - --gpu-memory-utilization
      - "0.90"
      - --enable-lora
      - --max-lora-rank
      - "320"
      - --max-loras
      - "2"
      - --limit-mm-per-prompt
      - '{"audio":3,"image":3}'
      - --default-mm-loras
      - '{"audio":"/models/voice/microsoft/Phi-4-multimodal-instruct/speech-lora","image":"/models/voice/microsoft/Phi-4-multimodal-instruct/vision-lora"}'
      - --uvicorn-log-level
      - info

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

networks:
  aether-ops:
    external: true
